services:
  terrapanel:
    image: "${TERRAPANEL_IMAGE:-ghcr.io/lumidust/terrapanel:latest}"
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:${TERRAPANEL_WEB_PORT:-8080}:8080"
      - "${TERRAPANEL_GAME_PORT:-7777}:${TERRAPANEL_SERVER_PORT:-7777}"
    volumes:
      - "${TERRAPANEL_DATA_PATH:-terrapanel-data}:/data"

volumes:
  terrapanel-data:
